# IO Checkout Commissioning - Production Stack
# Deploys Next.js commissioning app to dockerhost VM
# Uses Azure PostgreSQL database and Microsoft Entra ID authentication

networks:
  commissioning-network:
    driver: bridge
    name: commissioning-network
  
  nginx-proxy-manager_default:
    external: true

services:
  # Next.js Application - Production
  commissioning-app:
    image: registry.lci.ge/commissioning/app:latest
    container_name: commissioning-app
    restart: unless-stopped
    networks:
      - commissioning-network
      - nginx-proxy-manager_default
    env_file:
      - .env
    volumes:
      - commissioning_uploads:/app/uploads
      - commissioning_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

volumes:
  commissioning_uploads:
    name: commissioning_uploads
  commissioning_logs:
    name: commissioning_logs