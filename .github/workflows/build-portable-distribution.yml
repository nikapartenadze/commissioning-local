name: Build Portable Distribution

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force rebuild all components'
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/build-portable-distribution.yml'
    tags:
      - 'v*'
  release:
    types: [created]

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20.11.0'

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.cache-backend.outputs.cache-hit }}
      cache-key: ${{ steps.cache-keys.outputs.backend }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate cache keys
        id: cache-keys
        run: |
          # Create hash of all backend files
          BACKEND_HASH=$(find backend -type f -name "*.cs" -o -name "*.csproj" -o -name "config.json.template" | sort | xargs cat | sha256sum | cut -d' ' -f1)
          echo "backend=backend-build-${BACKEND_HASH}" >> $GITHUB_OUTPUT
          echo "Backend cache key: backend-build-${BACKEND_HASH}"

      - name: Check if force build
        id: force-check
        run: |
          if [[ "${{ github.event_name }}" == "release" ]] || \
             [[ "${{ github.ref }}" == refs/tags/* ]] || \
             [[ "${{ github.event.inputs.force_build }}" == "true" ]]; then
            echo "Force build - skipping cache"
            echo "skip-cache=true" >> $GITHUB_OUTPUT
          else
            echo "skip-cache=false" >> $GITHUB_OUTPUT
          fi

      - name: Restore backend from cache
        if: steps.force-check.outputs.skip-cache != 'true'
        id: cache-backend
        uses: actions/cache@v4
        with:
          path: backend-build/
          key: ${{ steps.cache-keys.outputs.backend }}

      - name: Setup .NET
        if: steps.cache-backend.outputs.cache-hit != 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache .NET packages
        if: steps.cache-backend.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Build .NET backend
        if: steps.cache-backend.outputs.cache-hit != 'true'
        run: |
          echo "Building .NET backend..."
          cd backend
          dotnet publish -c Release -r win-x64 --self-contained true \
            -p:PublishSingleFile=false \
            -o "../backend-build"

      - name: Include default config.json from template
        if: steps.cache-backend.outputs.cache-hit != 'true'
        run: |
          echo "Including default config.json from template"
          cd backend
          if [ -f ../backend-build/config.json ]; then
            echo "Error: config.json already exists"
            exit 1
          fi
          cp -v config.json.template ../backend-build/config.json

      - name: Upload backend artifact for packaging
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend-build/
          retention-days: 1

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.cache-frontend.outputs.cache-hit }}
      cache-key: ${{ steps.cache-keys.outputs.frontend }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate cache keys
        id: cache-keys
        run: |
          # Create hash of all frontend files (excluding node_modules and .next)
          FRONTEND_HASH=$(find frontend -type f \( -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.jsx" -o -name "*.json" \) ! -path "*/node_modules/*" ! -path "*/.next/*" | sort | xargs cat | sha256sum | cut -d' ' -f1)
          echo "frontend=frontend-build-${FRONTEND_HASH}" >> $GITHUB_OUTPUT
          echo "Frontend cache key: frontend-build-${FRONTEND_HASH}"

      - name: Check if force build
        id: force-check
        run: |
          if [[ "${{ github.event_name }}" == "release" ]] || \
             [[ "${{ github.ref }}" == refs/tags/* ]] || \
             [[ "${{ github.event.inputs.force_build }}" == "true" ]]; then
            echo "Force build - skipping cache"
            echo "skip-cache=true" >> $GITHUB_OUTPUT
          else
            echo "skip-cache=false" >> $GITHUB_OUTPUT
          fi

      - name: Restore frontend from cache
        if: steps.force-check.outputs.skip-cache != 'true'
        id: cache-frontend
        uses: actions/cache@v4
        with:
          path: frontend-build/
          key: ${{ steps.cache-keys.outputs.frontend }}

      - name: Setup Node.js
        if: steps.cache-frontend.outputs.cache-hit != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: steps.cache-frontend.outputs.cache-hit != 'true'
        run: |
          echo "Installing frontend dependencies..."
          cd frontend
          npm ci

      - name: Build Next.js frontend
        if: steps.cache-frontend.outputs.cache-hit != 'true'
        run: |
          echo "Building Next.js frontend..."
          cd frontend
          npm run build

      - name: Prepare frontend artifacts
        if: steps.cache-frontend.outputs.cache-hit != 'true'
        run: |
          echo "Preparing frontend build artifacts..."
          cd frontend
          mkdir -p ../frontend-build

          if [ -d ".next/standalone" ]; then
              cp -r .next/standalone/* ../frontend-build/
              cp -r .next/standalone/.next ../frontend-build/

              if [ -d ".next/static" ]; then
                  mkdir -p ../frontend-build/.next/static
                  cp -r .next/static/* ../frontend-build/.next/static/
              else
                  echo "WARNING: .next/static folder not found."
              fi
          else
              echo "WARNING: Standalone build not found. Copying entire .next folder..."
              cp -r .next ../frontend-build/.next
          fi

          if [ -d "public" ]; then
              cp -r public ../frontend-build/public
          else
              echo "WARNING: public folder not found."
          fi

      - name: Upload frontend artifact for packaging
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend-build/
          retention-days: 1
          include-hidden-files: true

  package:
    name: Package Distribution
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create distribution folder structure
        run: |
          mkdir -p dist/backend
          mkdir -p dist/frontend
          mkdir -p dist/nodejs

      - name: Download backend build artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: dist/backend

      - name: Download frontend build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: dist/frontend

      - name: Cache Node.js portable
        id: cache-nodejs
        uses: actions/cache@v4
        with:
          path: nodejs-portable.zip
          key: nodejs-${{ env.NODE_VERSION }}-win-x64

      - name: Download portable Node.js
        if: steps.cache-nodejs.outputs.cache-hit != 'true'
        run: |
          echo "Downloading Node.js portable for Windows..."
          NODEJS_URL="https://nodejs.org/dist/v${{ env.NODE_VERSION }}/node-v${{ env.NODE_VERSION }}-win-x64.zip"
          wget -q "$NODEJS_URL" -O nodejs-portable.zip

      - name: Extract portable Node.js
        run: |
          echo "Extracting Node.js..."
          unzip -q nodejs-portable.zip -d nodejs-extract

          EXTRACTED_FOLDER=$(find nodejs-extract -maxdepth 1 -type d -name "node-v*-win-x64" | head -n 1)

          if [ -n "$EXTRACTED_FOLDER" ]; then
              cp "$EXTRACTED_FOLDER/node.exe" "dist/nodejs/"
              cp "$EXTRACTED_FOLDER"/*.dll "dist/nodejs/" 2>/dev/null || true
              echo "Node.js portable included successfully!"
          fi

          rm -rf nodejs-extract

      - name: Copy launcher scripts and documentation
        run: |
          echo "Copying launcher scripts and documentation..."
          cp -v dist-include/* dist/

      - name: Create version info
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          if [[ "$GITHUB_REF" != refs/tags/* ]]; then
            VERSION="dev-${GITHUB_SHA:0:7}"
          fi

          BACKEND_STATUS="rebuilt"
          FRONTEND_STATUS="rebuilt"

          if [[ "${{ needs.build-backend.outputs.cache-hit }}" == "true" ]]; then
            BACKEND_STATUS="cached (reused from previous build)"
          fi

          if [[ "${{ needs.build-frontend.outputs.cache-hit }}" == "true" ]]; then
            FRONTEND_STATUS="cached (reused from previous build)"
          fi

          cat > "dist/BUILD_INFO.txt" << EOF
          Build Information
          =================
          Version: $VERSION
          Build Date: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          Commit: $GITHUB_SHA
          Repository: $GITHUB_REPOSITORY
          Workflow: $GITHUB_WORKFLOW

          Build Status:
          - Backend: $BACKEND_STATUS
          - Frontend: $FRONTEND_STATUS
          - Node.js: v${{ env.NODE_VERSION }}

          Cache Keys:
          - Backend: ${{ needs.build-backend.outputs.cache-key }}
          - Frontend: ${{ needs.build-frontend.outputs.cache-key }}
          EOF

      - name: Create ZIP archive
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          if [[ "$GITHUB_REF" != refs/tags/* ]]; then
            VERSION="dev-${GITHUB_SHA:0:7}"
          fi

          ZIP_NAME="IO-Checkout-Tool-Portable-${VERSION}.zip"

          cd dist
          zip -r "../${ZIP_NAME}" . -q
          cd ..

          echo "Archive created: ${ZIP_NAME}"
          echo "ARTIFACT_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Calculate checksums
        run: |
          sha256sum "${{ env.ARTIFACT_NAME }}" > "${{ env.ARTIFACT_NAME }}.sha256"
          md5sum "${{ env.ARTIFACT_NAME }}" > "${{ env.ARTIFACT_NAME }}.md5"

      - name: Upload final distribution
        uses: actions/upload-artifact@v4
        with:
          name: io-checkout-tool-portable-${{ env.VERSION }}
          path: dist/
          retention-days: 90
          include-hidden-files: true

      - name: Upload to release (if triggered by tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ env.ARTIFACT_NAME }}
            ${{ env.ARTIFACT_NAME }}.sha256
            ${{ env.ARTIFACT_NAME }}.md5
          body: |
            ## IO Checkout Tool - Portable Distribution

            ### Installation
            1. Download and extract the ZIP file
            2. Run `START.bat` to launch the application
            3. Use `STOP.bat` to stop all services

            ### What's Included
            - ✅ Self-contained .NET backend (no .NET installation required)
            - ✅ Next.js frontend build
            - ✅ Portable Node.js runtime
            - ✅ Easy-to-use launcher scripts

            ### Requirements
            - Windows 10/11 or Windows Server 2016+
            - No additional software installation needed

            See `README.txt` in the archive for detailed instructions.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}