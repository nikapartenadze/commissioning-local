# ============================================================================
# Battle-test stack — field-realistic overnight abuse for the commissioning
# tool. See ../docs/BATTLE-TEST-PLAN.md and README.md.
#
#   docker compose -f docker-compose.battle.yml -p battle up --build -d
#
# Profiles / knobs (env):
#   RUN_ID            run identifier (artifacts in the named `runs` volume,
#                     retrieve with: docker cp battle-observer-1:/runs/<RUN_ID> .)
#   SOAK_MINUTES      observer run length (default 480 = 8 h)
#   GATEWAY_IP        PLC target. default plc-sim (172.28.0.10);
#                     set to the Emulate box for high-fidelity runs —
#                     plc-sim then idles, the Windows server is only ever a
#                     CONNECT-ONLY target (never modified by this stack).
#   BOTS              simulated technicians (default 6)
#   DOWNLOAD_STORM    "20,40" => S2: program download every 20-40 min
#
# DinD-safe: no host bind mounts — every service is a built image and shared
# state lives in named volumes (gen, runs, tool-data). This is required for
# the GitLab tracker-ci-dind runner, where bind-mount sources would resolve
# inside the dind service container, not the checkout.
#
# NOTHING here touches production: no prod DB, no prod cloud, no dockerhost.
# ============================================================================

name: battle

networks:
  battle:
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  tool-data:
  gen:
  runs:

services:
  seeder:
    build:
      context: .
      dockerfile: seeder/Dockerfile
    environment:
      PYTHONUNBUFFERED: "1"
      GATEWAY_IP: ${GATEWAY_IP:-172.28.0.10}
      PLC_PATH: ${PLC_PATH:-1,0}
      SUBSYSTEM_ID: ${SUBSYSTEM_ID:-38}
      # central scenario: clone the subsystem into N MCMs, one plc-sim each
      MCM_COUNT: ${MCM_COUNT:-1}
      # central-cdw5: MCM_MODE=real + SEED_DB=/seed/database-cdw5.db — the
      # 19-MCM CDW5 production dump, real subsystems, per-MCM tag files
      MCM_MODE: ${MCM_MODE:-clone}
      SEED_DB: ${SEED_DB:-database.db}
      # central-cdw5-live: per-MCM PLC IPs (real Logix Emulate controllers on
      # the lab LAN). Default empties → seeder falls back to the 172.28.0.10+
      # sim addresses. Subsystem-sorted, one IP per MCM.
      MCM_GATEWAY_IPS: ${MCM_GATEWAY_IPS:-}
      # central-cdw5-live: restrict to the MCMs actually loaded on the bench
      # (positional match with MCM_GATEWAY_IPS). Empty → all subsystems.
      MCM_ONLY: ${MCM_ONLY:-}
      KEEP_DATA: ${KEEP_DATA:-0}
      # Tool↔cloud auth: this key is written into config.json (apiPassword) AND
      # into the cloud-stage project's api_key, so pushes validate.
      API_PASSWORD: ${CLOUD_API_KEY:-battle-key-mcm02}
      # Tool talks to cloud-stage, never prod (also enforced by CLOUD_URL_OVERRIDE
      # + the prod-domain blackhole on the tool service).
      REMOTE_URL: http://cloud:3000
    volumes:
      - tool-data:/data
      - gen:/gen
    networks: [battle]

  # ── cloud-stage: a throwaway commissioning-cloud + Postgres ───────────────
  # NEVER prod: fresh empty Postgres, schema via `prisma db push`, seeded with
  # the SAME IOs (matching ids) as the tool so sync validates. Image is built
  # locally (battle/cloud:local) or pulled in CI (CLOUD_IMAGE=registry...).
  cloud-db:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: battle
      POSTGRES_PASSWORD: battle
      POSTGRES_DB: commissioning
    networks: [battle]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U battle -d commissioning"]
      interval: 3s
      timeout: 3s
      retries: 20
    mem_limit: 512m
    cpus: 1

  cloud-schema:
    image: ${CLOUD_IMAGE:-battle/cloud:local}
    working_dir: /app
    environment:
      DATABASE_URL: postgresql://battle:battle@cloud-db:5432/commissioning
    # Create the schema from prisma/schema.prisma (cloud uses db push, no
    # migrations dir). One-shot; exits.
    command: ["node_modules/.bin/prisma", "db", "push", "--skip-generate", "--accept-data-loss"]
    depends_on:
      cloud-db:
        condition: service_healthy
    networks: [battle]
    restart: "no"

  cloud-seed:
    image: postgres:14-alpine
    environment:
      PGPASSWORD: battle
    volumes:
      - gen:/gen:ro
    # Apply the generated seed (project+subsystems+ios with matching ids).
    command: >
      sh -c "psql -h cloud-db -U battle -d commissioning -v ON_ERROR_STOP=1 -f /gen/cloud_seed.sql"
    depends_on:
      cloud-schema:
        condition: service_completed_successfully
      seeder:
        condition: service_completed_successfully
    networks: [battle]
    restart: "no"

  cloud:
    image: ${CLOUD_IMAGE:-battle/cloud:local}
    environment:
      DATABASE_URL: postgresql://battle:battle@cloud-db:5432/commissioning
      NODE_ENV: production
      NEXTAUTH_SECRET: battle-secret-not-prod
      NEXTAUTH_URL: http://cloud:3000
      NEXT_TELEMETRY_DISABLED: "1"
      SENTRY_DSN: ""
    depends_on:
      cloud-seed:
        condition: service_completed_successfully
    networks: [battle]
    ports:
      - "13001:3000"   # peek at the cloud UI / API during a soak
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.5

  # Cloud-side data changes (coordinator edits / other tablets / tracker).
  # Only runs under the `mutate` profile (cloud-mutation scenario). The field
  # picks these up on its next SSE-reconnect pull (driven by CLOUD_FLAP).
  cloud-mutator:
    build: ./cloud-mutator
    profiles: ["mutate"]
    environment:
      RUN_ID: ${RUN_ID:-dev}
      SUBSYSTEM_ID: ${SUBSYSTEM_ID:-38}
      MUTATE_PERIOD_SEC: ${MUTATE_PERIOD_SEC:-120}
      MUTATE_ADD: ${MUTATE_ADD:-3}
      MUTATE_EDIT: ${MUTATE_EDIT:-5}
    volumes:
      - runs:/runs
    depends_on:
      cloud-seed:
        condition: service_completed_successfully
    networks: [battle]
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25

  plc-sim:
    image: ${PLC_SIM_IMAGE:-battle/plc-sim:local}
    build: ./plc-sim
    networks:
      battle:
        ipv4_address: 172.28.0.10
    volumes:
      - gen:/gen:ro
    depends_on:
      seeder:
        condition: service_completed_successfully
    restart: unless-stopped
    mem_limit: 256m
    cpus: 1

  # ── central scenario: extra PLC sims, one per additional MCM ──────────────
  # All serve the SAME tag set (/gen/tags.txt) — the seeder clones the base
  # subsystem per MCM with identical tag names, so any sim can serve any clone.
  # The central tool holds one concurrent registry PlcClient per sim.
  plc-sim-2:
    image: ${PLC_SIM_IMAGE:-battle/plc-sim:local}
    profiles: ["central"]
    networks:
      battle:
        ipv4_address: 172.28.0.11
    volumes:
      - gen:/gen:ro
    depends_on:
      seeder:
        condition: service_completed_successfully
    restart: unless-stopped
    mem_limit: 256m
    cpus: 1

  plc-sim-3:
    image: ${PLC_SIM_IMAGE:-battle/plc-sim:local}
    profiles: ["central"]
    networks:
      battle:
        ipv4_address: 172.28.0.12
    volumes:
      - gen:/gen:ro
    depends_on:
      seeder:
        condition: service_completed_successfully
    restart: unless-stopped
    mem_limit: 256m
    cpus: 1

  plc-sim-4:
    image: ${PLC_SIM_IMAGE:-battle/plc-sim:local}
    profiles: ["central"]
    networks:
      battle:
        ipv4_address: 172.28.0.13
    volumes:
      - gen:/gen:ro
    depends_on:
      seeder:
        condition: service_completed_successfully
    restart: unless-stopped
    mem_limit: 256m
    cpus: 1

  # ── split deployment (Phase 1.1): the plc-gateway owns every PLC connection;
  # the tool runs PLC_MODE=remote and routes all PLC ops here over :3200. The
  # gateway broadcasts events (tag changes, McmReconnected → validation
  # restore) to the tool's :3102 seam. Same image, different command — exactly
  # the production split (frontend/docker-compose.split.yml).
  gateway:
    image: ${TOOL_IMAGE:-battle/tool:local}
    profiles: ["split"]
    command: ["node", "gateway-server.js"]
    # The image's baked-in HEALTHCHECK probes the APP port (:3000) — wrong for
    # the gateway process. Probe its own /health on :3200 instead.
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3200/health',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    environment:
      NODE_ENV: production
      GATEWAY_PORT: "3200"
      GATEWAY_HOST: 0.0.0.0
      WS_BROADCAST_URL: http://tool:3102/broadcast
      SENTRY_DISABLED: "true"
    networks: [battle]
    depends_on:
      seeder:
        condition: service_completed_successfully
      plc-sim:
        condition: service_started
    restart: unless-stopped
    mem_limit: 1g
    cpus: 2

  tool:
    image: ${TOOL_IMAGE:-battle/tool:local}
    environment:
      # daily file logs, 14d retention — observer scrapes them
      LOG_RETENTION_DAYS: "14"
      # split deployment knobs (empty = embedded monolith, the default)
      PLC_MODE: ${TOOL_PLC_MODE:-}
      GATEWAY_URL: ${TOOL_GATEWAY_URL:-}
      # battle errors must NOT pollute the real GlitchTip (the tool ships an
      # embedded DSN; observer judges stability from logs/audit instead)
      SENTRY_DISABLED: "true"
      # Point sync at cloud-stage. Without this the tool would target the
      # hardcoded production URL — see EMBEDDED_REMOTE_URL.
      CLOUD_URL_OVERRIDE: http://cloud:3000
    # Belt-and-suspenders: even if the override were ever dropped, the embedded
    # production hostname resolves to a dead loopback here — a battle tool can
    # NEVER reach production cloud.
    extra_hosts:
      - "commissioning.autstand.com:127.0.0.1"
    volumes:
      - tool-data:/data
    networks: [battle]
    ports:
      - "13000:3000"   # peek at the UI from the host while a soak runs
    depends_on:
      seeder:
        condition: service_completed_successfully
      plc-sim:
        condition: service_started
      cloud:
        condition: service_started
    restart: always    # SIGKILL chaos relies on this (NSSM-equivalent recovery)
    # central-cdw5 raises these (19 concurrent PlcClients / 25k IOs)
    mem_limit: ${TOOL_MEM:-1500m}
    cpus: ${TOOL_CPUS:-2}

  crew:
    build: ./crew
    environment:
      TOOL_URL: http://tool:3000
      BOTS: ${BOTS:-6}
      RUN_ID: ${RUN_ID:-dev}
      RUNS_DIR: /runs
      THINK_MIN_MS: ${THINK_MIN_MS:-2000}
      THINK_MAX_MS: ${THINK_MAX_MS:-15000}
      HOT_SET: ${HOT_SET:-12}
      HOT_FRACTION: ${HOT_FRACTION:-0.35}
    volumes:
      - runs:/runs
    networks: [battle]
    depends_on:
      tool:
        condition: service_started
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5

  chaos:
    build: ./chaos
    environment:
      PLC_SIM_CONTAINER: battle-plc-sim-1
      # central scenario: downloads/power-cuts rotate across all sims
      PLC_SIM_CONTAINERS: ${PLC_SIM_CONTAINERS:-}
      TOOL_CONTAINER: battle-tool-1
      RUN_ID: ${RUN_ID:-dev}
      RUNS_DIR: /runs
      PYTHONUNBUFFERED: "1"
      DOWNLOAD_STORM: ${DOWNLOAD_STORM:-}
      CLOUD_FLAP: ${CLOUD_FLAP:-}
      NETWORK_NAME: battle_battle
    volumes:
      - runs:/runs
      - gen:/gen
      - /var/run/docker.sock:/var/run/docker.sock
    networks: [battle]
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25

  observer:
    build: ./observer
    environment:
      PYTHONUNBUFFERED: "1"
      TOOL_URL: http://tool:3000
      SOAK_MINUTES: ${SOAK_MINUTES:-480}
      RUN_ID: ${RUN_ID:-dev}
      RUNS_DIR: /runs
      DATA_DIR: /data
      FLAP_BUDGET: ${FLAP_BUDGET:-0}
      CLOUD_URL: http://cloud:3000
      CLOUD_API_KEY: ${CLOUD_API_KEY:-battle-key-mcm02}
      # central scenario: comma-separated list of every seeded subsystem so the
      # cloud-side I4 read covers all clones
      SUBSYSTEM_ID: ${OBS_SUBSYSTEM_IDS:-${SUBSYSTEM_ID:-38}}
    volumes:
      - runs:/runs
      - tool-data:/data:ro
    networks: [battle]
    depends_on:
      tool:
        condition: service_started
    # NO restart policy — observer exiting carries the verdict exit code:
    #   docker wait battle-observer-1
    mem_limit: 256m
    cpus: 0.5
